name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build (static export)
        env:
          NEXT_PUBLIC_BASE_PATH: /limbo-consulting
        run: npm run build

      - name: Assemble Pages artifact under /limbo-consulting
        run: |
          mkdir -p deploy-root
          mv out deploy-root/limbo-consulting
          cat > deploy-root/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta http-equiv="refresh" content="0; url=/limbo-consulting/" />
            <title>LIMBO Consulting</title>
          </head>
          <body>
            <p>Redirecting to <a href="/limbo-consulting/">LIMBO Consulting</a>&hellip;</p>
            <script>window.location.replace("/limbo-consulting/");</script>
          </body>
          </html>
          HTML

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy-root

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
